# data/job-apps/ats_defaults.yaml
# ATS-specific field maps and answer patterns loaded by job_agent_support/ats/*.py
# Edit this file to update question answers without touching Python code.

ashbyhq:
  # name attr → components.yaml personal key
  system_fields:
    _systemfield_name:  full_name
    _systemfield_email: email

  # Label keyword (lowercase) → personal key (UUID-based custom text fields)
  label_field_map:
    phone:     phone
    linkedin:  linkedin
    website:   portfolio
    github:    github
    portfolio: portfolio

  # Yes/No question label substrings → answer
  yesno_answers:
    "security clearance":         "Yes"
    "u.s. citizenship":           "Yes"
    "authorized to work":         "Yes"
    "legally authorized":         "Yes"
    "require sponsorship":        "No"
    "require an employment visa": "No"
    "willing to relocate":        "Yes"
    "located in":                 "Yes"

  # Label keyword (lowercase) → components.yaml eeoc key
  eeoc_label_map:
    gender:     gender
    race:       race
    ethnicity:  race
    hispanic:   hispanic
    veteran:    veteran
    disability: disability

greenhouse:
  # Input id/name → personal key
  field_map:
    first_name:   first_name
    last_name:    last_name
    email:        email
    phone:        phone
    resume:       resume
    cover_letter: cover_letter
    website:      portfolio
    linkedin:     linkedin
    location:     location

  # Label substring (lowercase) → answer for compliance React Select dropdowns
  compliance_answers:
    "legally authorized to work in the united states": "Yes"
    "authorized to work in the united states":         "Yes"
    "require sponsorship for employment visa":         "No"
    "will you now, or in the future, require":         "No"
    "immigration related support or sponsorship":      "No"
    "are you 18 years of age":                        "Yes"
    "how did you hear":                               "LinkedIn"
    "how did you find":                               "LinkedIn"
    "have you ever worked for":                       "No"

  # Greenhouse React Select input IDs → fallback answer when not in components.yaml
  eeoc_defaults:
    gender:             "Decline To Self Identify"
    hispanic_ethnicity: "Decline To Self Identify"
    race:               "Decline To Self Identify"
    veteran_status:     "I don't wish to answer"
    disability_status:  "I do not want to answer"

  # Greenhouse field ID → components.yaml eeoc key (for override lookup)
  eeoc_components_map:
    gender:             gender
    hispanic_ethnicity: hispanic
    race:               race
    veteran_status:     veteran
    disability_status:  disability

icims:
  # Input id/name (lowercase) → personal key
  field_map:
    firstname:     first_name
    first_name:    first_name
    lastname:      last_name
    last_name:     last_name
    email:         email
    email_address: email
    phone:         phone
    phonenumber:   phone
    phone_number:  phone
    city:          city
    address:       location
    linkedin:      linkedin
    linkedinurl:   linkedin
    linkedin_url:  linkedin
    website:       portfolio
    portfoliourl:  portfolio

  # Label text prefix → personal key
  label_hints:
    "first name": first_name
    "last name":  last_name
    email:        email
    phone:        phone
    city:         city
    linkedin:     linkedin
    website:      portfolio

  # Label keyword (lowercase) → components.yaml eeoc key
  eeoc_label_map:
    gender:     gender
    race:       race
    ethnicity:  race
    hispanic:   hispanic
    veteran:    veteran
    disability: disability
